kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: order-scaling
  namespace: micro-svc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-svc
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50

